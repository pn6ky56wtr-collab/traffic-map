<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-Time Traffic App</title>

  <!-- Leaflet Map -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }

    h1 {
      background: #222;
      color: white;
      margin: 0;
      padding: 15px;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>

<body>

  <h1>Real-Time Traffic Map</h1>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // Create map
    const map = L.map('map').setView([25.2048, 55.2708], 11); // Dubai

    // Normal map layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // ===== TOMTOM TRAFFIC LAYER =====
    // Replace YOUR_API_KEY with your real TomTom API key

    const trafficLayer = L.tileLayer(
      'https://api.tomtom.com/traffic/map/4/tile/flow/relative/{z}/{x}/{y}.png?key=YOUR_API_KEY',
      {
        opacity: 0.8
      }
    );

    trafficLayer.addTo(map);

    // Marker example
    L.marker([25.2048, 55.2708])
      .addTo(map)
      .bindPopup("Dubai Traffic Center")
      .openPopup();

  </script>

</body>
</html>
